name: Publish to NuGet

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Restore
        run: dotnet restore CHDSharpLib/CHDSharpLib.csproj

      - name: Build
        run: dotnet build CHDSharpLib/CHDSharpLib.csproj -c Release --no-restore

      - name: Pack
        run: dotnet pack CHDSharpLib/CHDSharpLib.csproj -c Release --output artifacts --no-build

      - name: Restore tests
        run: dotnet restore CHDSharpTest/CHDSharpTest.csproj

      - name: Run tests
        run: dotnet test CHDSharpTest/CHDSharpTest.csproj -c Release --no-restore

      - name: Get OIDC token
        run: |
          RESPONSE=$(curl -s -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=https://api.nuget.org")
          OIDC_TOKEN=$(echo "$RESPONSE" | jq -r .value)
          if [ -z "$OIDC_TOKEN" ] || [ "$OIDC_TOKEN" = "null" ]; then
            echo "ERROR: Failed to get OIDC token"
            echo "$RESPONSE"
            exit 1
          fi
          echo "OIDC token length: ${#OIDC_TOKEN}"

          # Decode JWT payload (second dot-separated segment)
          PAYLOAD=$(echo "$OIDC_TOKEN" | cut -d. -f2 | base64 -d 2>/dev/null || true)
          if [ -n "$PAYLOAD" ]; then
            CLAIMS=$(echo "$PAYLOAD" | jq -c '{sub, repository, workflow, job_workflow_ref, ref, aud, actor, iss}' 2>/dev/null || echo "$PAYLOAD")
            echo "JWT claims: $CLAIMS"
          fi

          echo "NUGET_TOKEN=$OIDC_TOKEN" >> $GITHUB_ENV

      - name: Push to NuGet.org
        run: |
          dotnet nuget push artifacts/CHDSharp.*.nupkg \
            --api-key "$NUGET_TOKEN" \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate
          dotnet nuget push artifacts/CHDSharp.*.snupkg \
            --api-key "$NUGET_TOKEN" \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate
